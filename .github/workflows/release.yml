name: Release AI School

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.0.0)'
        required: true
        default: 'v1.1.0'

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase Repository Owner
        run: |
          echo "OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. 构建后端镜像
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/aischool-backend:latest
            ghcr.io/${{ env.OWNER_LOWER }}/aischool-backend:${{ env.VERSION }}

      # 2. 构建前端镜像
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/aischool-frontend:latest
            ghcr.io/${{ env.OWNER_LOWER }}/aischool-frontend:${{ env.VERSION }}

      # 3. 构建一体化 Standalone 镜像
      - name: Build and Push Standalone Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.standalone
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/aischool-standalone:latest
            ghcr.io/${{ env.OWNER_LOWER }}/aischool-standalone:${{ env.VERSION }}

      # 4. 打包镜像为离线文件 (.tar.gz)
      - name: Save Docker Images as Artifacts
        run: |
          docker pull ghcr.io/${{ env.OWNER_LOWER }}/aischool-standalone:${{ env.VERSION }}
          docker save \
            ghcr.io/${{ env.OWNER_LOWER }}/aischool-standalone:${{ env.VERSION }} \
            | gzip > aischool-standalone-${{ env.VERSION }}.tar.gz

      # 5. 创建 Git Tag 并提交 (仅手动触发时)
      - name: Create Git Tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ env.VERSION }} -m "Release ${{ env.VERSION }}"
          git push origin ${{ env.VERSION }}

      # 5. 创建 GitHub Release 并上传附件
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: |
            aischool-standalone-${{ env.VERSION }}.tar.gz
            docker-compose.yml
            .env.example
          body: |
            AI School ${{ env.VERSION }} 发布包。
            
            ### Standalone 模式 (推荐)
            1. 下载 `aischool-standalone-${{ env.VERSION }}.tar.gz`。
            2. 运行 `docker load -i aischool-standalone-${{ env.VERSION }}.tar.gz` 加载镜像。
            3. 直接启动：`docker run -d -p 8000:8000 --name aischool-app ghcr.io/${{ env.OWNER_LOWER }}/aischool-standalone:${{ env.VERSION }}`。
            
            ### Docker Compose 模式 (适合生产/集群)
            1. 下载所有附件。
            2. 配置 `.env`。
            3. 运行 `docker-compose up -d`。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

version: '3.8'

services:
  db:
    image: postgres:15
    pull_policy: if_not_present
    environment:
      POSTGRES_DB: aischool
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    pull_policy: if_not_present
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/aischool
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  chroma_data:
